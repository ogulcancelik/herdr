id = "codex"
version = "2026.07.10.1"
min_engine_version = 2
updated_at = "2026-07-10T00:00:00Z"

[[rules]]
id = "osc_title_blocked"
state = "blocked"
priority = 1100
region = "osc_title"
visible_blocker = true
contains = ["Action Required"]

[[rules]]
id = "osc_title_working"
state = "working"
priority = 1050
region = "osc_title"
visible_working = true
regex = ['^[\x{2800}-\x{28FF}] ']

[[rules]]
id = "transcript_viewer"
state = "unknown"
priority = 1000
region = "after_last_prompt_marker"
skip_state_update = true
contains = ["↑/↓ to scroll", "pgup/pgdn to", "home/end to jump", "q to quit"]
any = [
  { contains = ["esc to edit prev"] },
  { contains = ["esc/← to edit prev"] },
]

[[rules]]
id = "live_strong_blocker"
state = "blocked"
priority = 900
region = "after_last_prompt_marker"
visible_blocker = true
any = [
  { contains = ["press enter to confirm or esc to cancel"] },
  { contains = ["enter to submit answer"] },
  { contains = ["enter to submit all"] },
  { contains = ["allow command?"] },
]

[[rules]]
id = "weak_blocker"
state = "blocked"
priority = 600
region = "whole_recent"
any = [
  { contains = ["[y/n]"] },
  { contains = ["yes (y)"] },
  { contains = ["do you want to"], any = [{ contains = ["yes"] }, { contains = ["❯"] }] },
  { contains = ["would you like to"], any = [{ contains = ["yes"] }, { contains = ["❯"] }] },
]

[[rules]]
id = "osc_title_idle"
state = "idle"
priority = 100
region = "osc_title"
visible_idle = true
regex = ['\S']
not = [
  { regex = ['^[\x{2800}-\x{28FF}]'] },
  { contains = ["Action Required"] },
]

[[rules]]
# Codex >= ~0.144 active turns show "• Working (33m 09s • esc to interrupt)" in the
# transcript footer, but the OSC title carries no spinner when the host (herdr
# itself, or the user's shell) owns the pane title — so osc_title_working never
# fires and active turns fall through to osc_title_idle (#1281). Detect the
# working footer from screen content instead. Priority sits below the strong
# blocker rules (900); Codex replaces this footer with the prompt while
# blocked, so they never appear together.
id = "screen_working_footer"
state = "working"
priority = 700
region = "bottom_non_empty_lines(10)"
visible_working = true
contains = ["esc to interrupt"]
