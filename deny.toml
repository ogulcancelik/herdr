# cargo-deny — dependency licenses + RUSTSEC advisories, run by the cargo-deny
# pre-commit hook (and `cargo deny check`). Baseline config: permissive license
# allow-list covering herdr's tree, multiple-versions tolerated (large async
# graph), advisories deny by default with an explicit, auditable `ignore` list.

[advisories]
version = 2
yanked = "warn"
ignore = [
  # bincode (transitive) flagged unmaintained — informational, no fix available
  # upstream yet; not a vulnerability. Revisit if a maintained successor lands.
  "RUSTSEC-2025-0141",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  # herdr itself is AGPL-3.0-or-later; copyleft deps are license-compatible.
  "AGPL-3.0-or-later",
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "0BSD",
  "BSL-1.0",
]

[bans]
# herdr pulls a broad async/TUI graph; duplicate transitive versions are noise,
# not a defect class worth gating. Revisit if binary size becomes a concern.
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
