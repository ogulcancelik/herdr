id = "commandcode"
version = "2026.07.05.1"
min_engine_version = 1
updated_at = "2026-07-05T00:00:00Z"
aliases = ["cmd", "command-code", "command code", "herdr:commandcode"]

[[rules]]
id = "shell_permission_prompt"
state = "blocked"
priority = 900
region = "whole_recent"
visible_blocker = true
contains = [
  "Execute Shell Command",
  "Command Code needs to execute",
  "1. Yes",
  "No, and tell Command Code what to do differently",
]

[[rules]]
id = "ask_prompt_idle"
state = "idle"
priority = 100
region = "whole_recent"
visible_idle = true
contains = ["❯ Ask your question"]

[[rules]]
id = "input_prompt_idle"
state = "idle"
priority = 110
region = "whole_recent"
visible_idle = true
line_regex = ['^\s*❯\s+.*\S.*$']

[[rules]]
id = "interrupt_hint_working"
state = "working"
priority = 120
region = "whole_recent"
visible_working = true
contains = ["esc", "to interrupt"]
